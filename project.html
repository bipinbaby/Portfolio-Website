<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title is updated dynamically by projectDetail.js -->
  <title>Project — Bipin Baby</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/project.css" />

  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Lenis !== 'undefined') {
        const lenis = new Lenis({ duration: 1.25, easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smoothWheel: true });
        function raf(t) { lenis.raf(t); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
      }
    });
  </script>
</head>
<body>

  <nav class="nav"></nav>

  <!--
    This <main> is the only content area on this page.
    Everything inside it is generated by projectDetail.js
    based on the ?slug= URL parameter.
    You don't need to edit the HTML here — edit data/projects.js instead.
  -->
  <main id="project-detail-main" class="project-detail"></main>

  <footer class="footer"></footer>

  <script type="module">
    import { initNav, initFooter }  from './js/components/nav.js';
    import { initProjectDetail }    from './js/components/projectDetail.js';

    initNav();
    initFooter();
    initProjectDetail();
  </script>

</body>
</html>
